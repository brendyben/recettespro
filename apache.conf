# RecettesPro (R-Pro) - Configuration Apache de production
# DocumentRoot pointe vers /var/www/html (PHP à la racine, pas de public/)

<VirtualHost *:80>
    ServerName rpro.bakapdatalabs.com
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex login_agent.php index.php
    </Directory>

    # ===== SECURITE - Bloquer l'acces direct aux fichiers sensibles =====

    # Cle Google Sheets API (CRITIQUE)
    <Files "client_secret.json">
        Require all denied
    </Files>

    # Tous les fichiers JSON sensibles
    <FilesMatch "^.*\.(json|lock)$">
        Require all denied
    </FilesMatch>

    # Bloquer l'acces aux CSV (donnees fiscales)
    <FilesMatch "\.csv$">
        Require all denied
    </FilesMatch>

    # Bloquer l'acces direct au dossier data/
    <Directory /var/www/html/data>
        Require all denied
    </Directory>

    # Bloquer l'acces direct au dossier vendor/
    <Directory /var/www/html/includes/vendor>
        Require all denied
    </Directory>

    # Bloquer les fichiers de test et de developpement
    <FilesMatch "(test_|_test|\.bak|\.old|~)">
        Require all denied
    </FilesMatch>

    # Bloquer les fichiers caches (.htaccess, .git, .env, etc.)
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    # ===== HEADERS DE SECURITE =====

    # Empecher le sniffing MIME
    Header always set X-Content-Type-Options "nosniff"

    # Empecher le clickjacking
    Header always set X-Frame-Options "SAMEORIGIN"

    # Politique referer
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Cacher la version Apache/PHP
    ServerSignature Off

    # ===== LOGS =====

    ErrorLog ${APACHE_LOG_DIR}/rpro_error.log
    CustomLog ${APACHE_LOG_DIR}/rpro_access.log combined
    LogLevel warn
</VirtualHost>
